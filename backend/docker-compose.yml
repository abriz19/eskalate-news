services:
  db:
    image: postgres:16-alpine
    container_name: eskalate-news-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eskalate
      POSTGRES_PASSWORD: eskalate_secret
      POSTGRES_DB: eskalate_news
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
